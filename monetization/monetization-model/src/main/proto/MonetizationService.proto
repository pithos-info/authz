syntax = "proto3";

package info.pithos.monetization.service;

import "google/protobuf/empty.proto";
import "Monetization.proto";

option java_package = "info.pithos.monetization.service";
option java_outer_classname = "MonetizationServiceProto";
option java_multiple_files = true;

// ─── Shared types ─────────────────────────────────────────────────────────────

message GetByIdRequest { string id = 1; }

// ─── App ──────────────────────────────────────────────────────────────────────

message CreateAppRequest {
  string slug        = 1;
  string name        = 2;
  // Optional. If set, the new App is derived from this parent: version is
  // auto-incremented and parentAppId is set. Absent → version 1, no parent.
  string parentAppId = 3;
}

message App {
  string id           = 1;
  string slug         = 2;
  string name         = 3;
  string ownerId      = 4;
  int32  version      = 5;
  string parentAppId  = 6;
  int64  utcCreatedAt = 7;
  string createdBy    = 8;
}

message AppList {
  repeated App apps = 1;
}

service AppService {
  rpc Create(CreateAppRequest)        returns (App);
  rpc Get(GetByIdRequest)             returns (App);
  rpc List(google.protobuf.Empty)     returns (AppList);
}

// ─── Feature ──────────────────────────────────────────────────────────────────

message CreateFeatureRequest {
  string appId                   = 1;
  string name                    = 2;
  int32  richardsonMaturityLevel = 3;
  // Optional. If set, the new Feature is derived from this parent: version is
  // auto-incremented and parentFeatureId is set. Absent → version 1, no parent.
  string parentFeatureId         = 4;
}

message Feature {
  string id                      = 1;
  string appId                   = 2;
  string name                    = 3;
  int32  richardsonMaturityLevel = 4;
  int32  version                 = 5;
  string parentFeatureId         = 6;
  int64  utcCreatedAt            = 7;
  string createdBy               = 8;
}

message FeatureList {
  repeated Feature features = 1;
}

service FeatureService {
  rpc Create(CreateFeatureRequest) returns (Feature);
  rpc Get(GetByIdRequest)          returns (Feature);
  rpc ListByApp(GetByIdRequest)    returns (FeatureList);
}

// ─── Journey ──────────────────────────────────────────────────────────────────

message CreateJourneyRequest {
  string appId            = 1;
  string name             = 2;
  string displayName      = 3;
  string description      = 4;
  string goal             = 5;
  string outcomeStatement = 6;
  // Optional. If set, the new Journey is derived from this parent: version is
  // auto-incremented and parentJourneyId is set. Absent → version 1, no parent.
  string parentJourneyId  = 7;
}

message Journey {
  string id               = 1;
  string appId            = 2;
  string name             = 3;
  string displayName      = 4;
  string description      = 5;
  string goal             = 6;
  string outcomeStatement = 7;
  int32  version          = 8;
  string parentJourneyId  = 9;
  int64  utcCreatedAt     = 10;
  string createdBy        = 11;
}

message JourneyList {
  repeated Journey journeys = 1;
}

service JourneyService {
  rpc Create(CreateJourneyRequest) returns (Journey);
  rpc Get(GetByIdRequest)          returns (Journey);
  rpc ListByApp(GetByIdRequest)    returns (JourneyList);
}

// ─── Workflow ─────────────────────────────────────────────────────────────────

message CreateWorkflowRequest {
  string                                    appId            = 1;
  string                                    journeyId        = 2;
  info.pithos.monetization.model.DepthLevel depthLevel       = 3;
  // Optional. If set, the new Workflow is derived from this parent: version is
  // auto-incremented and parentWorkflowId is set. Absent → version 1, no parent.
  string                                    parentWorkflowId = 4;
}

message Workflow {
  string                                    id               = 1;
  string                                    appId            = 2;
  string                                    journeyId        = 3;
  info.pithos.monetization.model.DepthLevel depthLevel       = 4;
  int32                                     version          = 5;
  string                                    parentWorkflowId = 6;
  int64                                     utcCreatedAt     = 7;
  string                                    createdBy        = 8;
}

// WorkflowStep is one ordered step within a workflow — the feature + its position.
// Embedded in WorkflowDetail; never persisted directly.
message WorkflowStep {
  int32   stepOrder = 1;
  Feature feature   = 2;
}

// WorkflowDetail is the enriched view of a Workflow: the workflow itself plus its
// ordered steps with full feature details. Returned by Get and ListByJourney so
// callers assemble the full picture in a single call.
message WorkflowDetail {
  Workflow              workflow = 1;
  repeated WorkflowStep steps    = 2;
}

message WorkflowDetailList {
  repeated WorkflowDetail workflows = 1;
}

service WorkflowService {
  rpc Create(CreateWorkflowRequest) returns (Workflow);
  rpc Get(GetByIdRequest)           returns (WorkflowDetail);
  rpc ListByJourney(GetByIdRequest) returns (WorkflowDetailList);
}

// ─── WorkflowFeature ──────────────────────────────────────────────────────────
// WorkflowFeature is an association — it has no independent version lifecycle.
// To evolve a Workflow's feature set, create a new Workflow version (with
// parentWorkflowId) and re-Add the desired features to it.

message AddWorkflowFeatureRequest {
  string workflowId = 1;
  string featureId  = 2;
  int32  stepOrder  = 3;
}

message RemoveWorkflowFeatureRequest {
  string workflowId = 1;
  string featureId  = 2;
}

message WorkflowFeature {
  string appId        = 1;
  string workflowId   = 2;
  string featureId    = 3;
  int32  stepOrder    = 4;
  int64  utcCreatedAt = 5;
  string createdBy    = 6;
}

message WorkflowFeatureList {
  repeated WorkflowFeature workflowFeatures = 1;
}

service WorkflowFeatureService {
  rpc Add(AddWorkflowFeatureRequest)       returns (WorkflowFeature);
  rpc Remove(RemoveWorkflowFeatureRequest) returns (google.protobuf.Empty);
  rpc ListByWorkflow(GetByIdRequest)       returns (WorkflowFeatureList);
}
